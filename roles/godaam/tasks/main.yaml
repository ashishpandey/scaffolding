---
- name: Ensure scripts
  ansible.builtin.file:
    path: /mnt/user/scripts
    state: directory
    mode: "0777"
    owner: nobody
    group: users

- name: Copy mirror script
  ansible.builtin.copy:
    src: scripts/mirror.sh
    dest: /mnt/user/scripts/mirror.sh
    mode: "0555"
    owner: nobody
    group: users

- name: Copy rclone sync scans script
  ansible.builtin.copy:
    src: scripts/rclone_sync_scans.sh
    dest: /mnt/user/scripts/rclone_sync_scans.sh
    mode: "0555"
    owner: nobody
    group: users

- name: Copy rclone sync gdocs script
  ansible.builtin.copy:
    src: scripts/rclone_gdocs.sh
    dest: /mnt/user/scripts/rclone_gdocs.sh
    mode: "0555"
    owner: nobody
    group: users

- name: Copy sync script
  ansible.builtin.copy:
    src: scripts/sync.sh
    dest: /mnt/user/scripts/sync.sh
    mode: "0555"
    owner: nobody
    group: users

- name: Copy zfs script
  ansible.builtin.copy:
    src: scripts/zfs_prune_snapshots.sh
    dest: /mnt/user/scripts/zfs_prune_snapshots.sh
    mode: "0555"
    owner: nobody
    group: users

- ansible.builtin.include_tasks: plugin_file.yaml
  vars:
    file: plugins/dynamix.system.temp/sensors.conf

- ansible.builtin.include_tasks: plugin_file.yaml
  vars:
    file: plugins/theme.engine/custom.css

- name: Install user scripts
  ansible.builtin.include_tasks:
    file: plugin_file.yaml
    apply:
      tags:
        - user.scripts
  vars:
    file: plugins/user.scripts/scripts/{{ item }}/script
  loop:
    - backup-media
    - check-docker
    - docker-networks
    - test-print
    - zbackup
    - zscrub
  tags:
    - user.scripts

- name: Docker-cache app
  ansible.builtin.import_tasks: template_dir.yaml
  vars:
    template_src: appdata/docker-cache
    template_dest: /mnt/user/appdata
  tags:
    - docker-cache
    - app

- name: Frigate app
  ansible.builtin.import_tasks: template_dir.yaml
  vars:
    template_src: appdata/frigate
    template_dest: /mnt/user/appdata
  tags:
    - frigate
    - app

- name: Homepage app
  ansible.builtin.import_tasks: template_dir.yaml
  vars:
    template_src: appdata/homepage
    template_dest: /mnt/user/appdata
  tags:
    - homepage
    - app

- name: Gatus app
  ansible.builtin.import_tasks: template_dir.yaml
  vars:
    template_src: appdata/gatus
    template_dest: /mnt/user/appdata
  tags:
    - gatus
    - app

- name: Setup sensors
  ansible.builtin.blockinfile:
    path: /boot/config/go
    marker: "######## {mark} SENSORS SETUP ########"
    block: |
      # modprobe for each sensor
      modprobe nct6775
      modprobe coretemp
      /usr/bin/sensors -s

- name: Setup filesystems
  ansible.builtin.blockinfile:
    path: /boot/config/go
    marker: "######## {mark} FILESYSTEMS SETUP ########"
    block: |
      # bigger tmpfs
      mount -o remount,size=256M /var/log

      # zfs ARC allocation
      echo "#Adjusting ARC memory usage (limit 16GB)"
      echo 17179869184 > /sys/module/zfs/parameters/zfs_arc_max

- name: Traefik config
  ansible.builtin.import_tasks: template_dir.yaml
  vars:
    template_src: appdata/traefik
    template_dest: /mnt/cache/appdata
  tags:
    - traefik
    - app

- name: Homepage app
  ansible.builtin.import_tasks: compose_patch.yaml
  tags:
    - compose
    - compose.patch

