x-host-env: &host-env
  PUID: '99'
  PGID: '100'
  UMASK: '022'
  TZ: Asia/Hong_Kong

services:
  rclone:
    container_name: rclone
    image: rclone/rclone:latest
    network_mode: bridge
    command: 
      - rcd 
      - --rc-web-gui 
      - --rc-web-gui-update 
      - --rc-web-gui-force-update 
      - --rc-web-gui-no-open-browser
      - --rc-addr 
      - :5572
      - --rc-user 
      - rclone 
      - --rc-pass 
      - "${RCLONE_PASS}"
    environment:
      <<: *host-env
      PHP_TZ: Asia/Hong_Kong
    ports:
      - '5572:5572'
    volumes:
      - '/mnt/user/data/GDrive/:/mnt/GDrive:rw,slave'
      - '/mnt/user/appdata/rclone:/config/rclone:rw'
    devices:
      - /dev/fuse
    restart: unless-stopped
        
  syncthing:
    container_name: syncthing
    image: lscr.io/linuxserver/syncthing:latest
    network_mode: bridge
    environment:
      <<: *host-env
    ports:
      - '8384:8384/tcp'
      - '22000:22000/tcp'
      - '22000:22000/udp'
      - '21027:21027/udp'
    volumes:
      - '/mnt/user:/data:rw'
      - '/mnt/user/appdata/syncthing:/config:rw'
    restart: unless-stopped
    
  calibre-web:
    image: crocodilestick/calibre-web-automated:latest
    container_name: calibre-web
    network_mode: bridge
    environment:
      <<: *host-env
    volumes:
      - /mnt/user/appdata/calibre/web:/config
      - /mnt/user/media/Books/Calibre:/calibre-library
      - /mnt/user/appdata/calibre/ingest:/cwa-book-ingest
    restart: unless-stopped
    labels:
      traefik.enable: true
      traefik.http.services.calibre-web.loadbalancer.server.port: '8083'
      traefik.http.routers.calibre-web.rule: 'Host(`books.app.apandey.com`)'

  calibre-downloader:
    image: ghcr.io/calibrain/calibre-web-automated-book-downloader:latest
    container_name: calibre-downloader
    network_mode: bridge
    environment:
      <<: *host-env
      FLASK_PORT: 8084
      FLASK_DEBUG: false
      CLOUDFLARE_PROXY_URL: http://cloudflare-bypass:8000
      INGEST_DIR: /cwa-book-ingest
      BOOK_LANGUAGE: en
    volumes:
      - /mnt/user/appdata/calibre/ingest:/cwa-book-ingest
    restart: unless-stopped
    labels:
      traefik.enable: true
      traefik.http.services.calibre-downloader.loadbalancer.server.port: '8084'
      traefik.http.routers.calibre-downloader.rule: 'Host(`librarian.app.apandey.com`)'

  cloudflare-bypass:
    image: ghcr.io/sarperavci/cloudflarebypassforscraping:latest
    container_name: cloudflare-bypass
    network_mode: bridge
    environment:
      <<: *host-env
    restart: unless-stopped